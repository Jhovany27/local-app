name: Deploy a producción

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build y subir al servidor
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. PHP 8.2 (igual que el servidor)
      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, pdo, tokenizer, xml, curl, gd, zip
          coverage: none

      # 3. Dependencias de PHP (sin dev, optimizado para producción)
      - name: Instalar dependencias Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # 4. Node.js 20 + compilar assets
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias NPM
        run: npm ci

      - name: Compilar assets (Vite)
        run: npm run build

      # 5. Subir al servidor por FTPS (solo archivos modificados)
      - name: Deploy por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /
          # Archivos que NUNCA se sobreescriben/suben al servidor
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/docker/**
            **/tests/**
            **/.env
            **/.env.example
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
